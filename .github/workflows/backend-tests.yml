name: Backend tests

# Runs the Flask backend's pytest suite on every push / PR that touches backend
# code or its dependencies. windows-latest matches the primary dev/build target;
# the suite is hermetic (no MexCLI/HSDRaw/ISO binaries needed) — verified by
# running it in a clean venv with only requirements.txt installed.

on:
  push:
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - '.github/workflows/backend-tests.yml'

jobs:
  pytest:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest tests/ -q
