<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Melee Modding Wiki</title>
    <link rel="stylesheet" href="wiki.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="eyebrow">SSBM Nucleus</div>
          <h1>Melee Wiki</h1>
          <p>Local markdown viewer for Melee modding notes and research.</p>
        </div>
        <nav id="nav" class="nav" aria-label="Wiki navigation"></nav>
        <div class="sidebar-footer">
          <div>Serve the repo root, then open <code>/wiki/</code>.</div>
          <div>Default page: <code>wiki/README.md</code>.</div>
        </div>
      </aside>
      <main class="content">
        <header class="page-header">
          <div class="eyebrow">Current Page</div>
          <h2 id="page-title">Loading...</h2>
          <div id="page-path" class="page-path"></div>
        </header>
        <article id="page-content" class="markdown-body">
          <p>Loading wiki page...</p>
        </article>
      </main>
    </div>
    <script type="module" src="wiki.js"></script>
  </body>
</html>
